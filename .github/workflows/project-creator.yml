name: 🏗️ Project Creator
on:
  schedule: [{ cron: '0 8 * * 1,4' }]
  workflow_dispatch:
permissions: { contents: write }
jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: source shared/utils.sh && bash bots/project-creator/scripts/project-creator.sh
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}', REPO: '${{ github.repository }}' }
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: project-creator-report, path: project-creator-report.md }
