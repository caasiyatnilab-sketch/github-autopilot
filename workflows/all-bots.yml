            gh pr create --title "🛠️ Auto-Fix: Code Corrections" --body "$(cat auto-fixer-report.md)" --label "automated,bug-fix"
          fi
---
name: 📊 Weekly Reporter
on:
  schedule: [{ cron: '0 17 * * 5' }]
  workflow_dispatch:
permissions: { contents: read, issues: read, pull-requests: read, actions: read }
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: 📊 Run
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}', REPO: '${{ github.repository }}' }
        run: |
          source shared/utils.sh
          bash bots/weekly-reporter/scripts/weekly-reporter.sh
      - name: 📋 Create Issue
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }
        run: gh issue create --title "📊 Weekly Report — $(date +%Y-%m-%d)" --body "$(cat weekly-reporter-report.md)" --label "documentation,automated"
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: weekly-report, path: weekly-reporter-report.md }
---
name: 🌐 API Hunter
on:
  schedule: [{ cron: '0 */6 * * *' }]
  workflow_dispatch:
permissions: { contents: write, issues: write }
jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🌐 Run
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}', REPO: '${{ github.repository }}', DISCORD_WEBHOOK: '${{ secrets.DISCORD_WEBHOOK || '' }}' }
        run: |
          source shared/utils.sh
          bash bots/api-hunter/scripts/api-hunter.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: api-hunter-report, path: api-hunter-report.md }
      - name: 💾 Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/found-apis.json 2>/dev/null
          git diff --cached --quiet || git commit -m "🌐 API Hunter: Update API database [skip ci]"
          git push || true
