---
name: 📦 Auto Updater
on:
  schedule: [{ cron: '0 8 * * 1' }]
  workflow_dispatch:
permissions: { contents: write, pull-requests: write }
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: 📦 Run
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}', REPO: '${{ github.repository }}' }
        run: |
          npm ci 2>/dev/null || true
          source shared/utils.sh
          bash bots/auto-updater/scripts/auto-updater.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: update-report, path: auto-updater-report.md }
      - name: 📤 PR
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            BRANCH="auto-update/$(date +%Y%m%d)"
            git checkout -b "$BRANCH"
            git add -A
            git commit -m "📦 auto-update: dependency updates [skip ci]"
            git push origin "$BRANCH"
            gh pr create --title "📦 Auto-Update: Dependencies" --body "$(cat auto-updater-report.md)" --label "automated,dependencies"
          fi
---
name: 🏷️ Issue & PR Manager
on:
  issues: { types: [opened] }
  pull_request: { types: [opened] }
  schedule: [{ cron: '0 0 * * *' }]
  workflow_dispatch:
permissions: { issues: write, pull-requests: write, contents: read }
jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🏷️ Run
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}', REPO: '${{ github.repository }}' }
        run: |
          source shared/utils.sh
          bash bots/issue-pr-manager/scripts/issue-pr-manager.sh ${{ github.event_name == 'schedule' && 'stale' || 'label' }}
---
